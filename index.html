function shell(c){return `<div class="app"><aside class="side"><div class="brand"><span class="mark"></span><span><b>Bussola IETF</b><small>Conectar - colaborar - orientar</small></span></div><nav class="nav">${nav.map(n=>`<button class="${S.route===n[0]?'on':''}" data-nav="${n[0]}"><b>${n[1][0]}</b><span>${n[1]}</span></button>`).join('')}</nav><div class="profile"><b>Perfil: Iniciante</b><small>Nivel 1 - 120 pts</small><div class="prog"><span style="width:42%"></span></div></div></aside><main class="main"><header class="top"><div class="search">Buscar <input id="global" value="${S.query}"></div><div class="langs">${['PT','ES','EN'].map(l=>`<button class="${S.locale===l?'on':''}" data-locale="${l}">${l}</button>`).join('')}</div><div class="user"><span class="avatar">${(S.user?.name||'Ana').slice(0,2).toUpperCase()}</span><span>${S.user?.name||'Ana Martins'}<br><small>${S.user?.role||'Participante'}</small></span></div><button class="btn3" id="logout">Sair</button></header><section class="content">${c}</section></main></div>`}
function graph(){let n=[['T2TRG',20,45,'#0ea5a4'],['GAIA',45,18,'#149a49'],['DINRG',75,26,'#8c249b'],['CFRG',44,53,'#143b78'],['CoRE',28,74,'#138a76'],['TLS',62,74,'#0f766e'],['NMRG',76,56,'#2763d3']],p=Object.fromEntries(n.map(x=>[x[0],[x[1],x[2]]])),l=[['T2TRG','GAIA','strong'],['T2TRG','CoRE','strong'],['GAIA','DINRG',''],['CFRG','TLS','strong'],['GAIA','TLS','dash'],['DINRG','NMRG',''],['T2TRG','DINRG','dash'],['CoRE','CFRG','dot']];return `<svg class="graph" viewBox="0 0 100 90">${l.map(x=>`<line class="${x[2]}" x1="${p[x[0]][0]}" y1="${p[x[0]][1]}" x2="${p[x[1]][0]}" y2="${p[x[1]][1]}"></line>`).join('')}${n.map(x=>`<g><circle cx="${x[1]}" cy="${x[2]}" r="7" style="stroke:${x[3]}"></circle><text x="${x[1]}" y="${x[2]+1}">${x[0]}</text></g>`).join('')}</svg>`}
function inicio(){return page('Visao geral','Encontre seu caminho no IETF','Descubra temas, grupos, documentos e oportunidades para se envolver.')+`<section class="hero"><div><h2>Roteie um tema para grupos, evidencias e proximas acoes.</h2><p>A Bussola organiza Datatracker, RFCs, listas, materiais de reuniao e sinais de adjacencia em recomendacoes auditaveis.</p><div class="hero-search"><input id="routeq" value="${S.query}"><button class="btn" id="routebtn">Rotear tema</button></div></div><div class="compass"></div></section>${metrics()}<div class="grid2">${card('Destaques da semana',opp.slice(0,3).map(o=>row(o)).join(''),'Ver todos')}${card('Mapa de adjacencia',graph(),'Abrir mapa')}</div>`}
function descoberta(){let rec=groups.slice(0,3);return page('Descoberta explicavel','Descoberta','Roteie perguntas para grupos IRTF/IETF com justificativas e fontes rastreaveis.')+`<div class="panel"><label>Descreva seu tema<textarea id="dq">${S.query}</textarea></label><button class="btn" id="analyze">Analisar tema</button></div><br><div class="grid2"><div class="stack">${rec.map((g,i)=>`<article class="row"><span class="ico">${i+1}</span><div><h3>${g.ac} - ${g.name}</h3><p>${g.txt}</p>${tags(g.t.concat([`${[92,86,78][i]}% aderencia`]))}</div><button class="btn2" data-watch="${g.ac}">Acompanhar</button></article>`).join('')}</div>${card('Evidencias',ev.map(e=>`<p><b>${e[0]}</b><br>${e[5]}<br>${tags([e[2],e[3].toFixed(2)])}</p>`).join(''),'Ver todas')}</div>`}
function onboarding(){let steps=['Idioma','Nivel de experiencia','Grupos conhecidos','Temas de interesse','Canais'];return page('Primeiros passos','Onboarding inicial','Configure a experiencia em poucos passos.')+`<div class="grid2"><div class="card"><h2>Passo 1 de 5</h2><div class="metrics" style="grid-template-columns:repeat(3,1fr)">${['Portugues (PT)','Espanol (ES)','English (EN)'].map((x,i)=>`<button class="${i?'btn2':'btn'}">${x}</button>`).join('')}</div><div class="notice">Voce pode mudar idioma, grupos e canais a qualquer momento.</div><br><button class="btn" data-toast="Preferencias salvas">Continuar</button></div>${card('Sua trilha',steps.map((s,i)=>`<p><b>${i+1}. ${s}</b><br><span class="tag ${i===0?'green':''}">${i?'Pendente':'Concluido'}</span></p>`).join(''))}</div>`}
function torre(){return page('Monitoramento avancado','Torre de vigia','Sinais, FYI, maturacao, janelas de acao e adjacencias em tempo quase real.')+tabs(['Todos','FYI','Janela de acao','Maturacao','Adjacencias'])+`<div class="grid2"><div class="stack">${opp.map(o=>row(o,'Tomar acao')).join('')}</div>${card('Proximas reunioes',['T2TRG - 28 mai - online','GAIA - 04 jun - online','CoRE - 11 jun - online'].map(x=>`<p><b>${x}</b><br><button class="btn2">Adicionar ao calendario</button></p>`).join(''))}</div>`}
function acompanhamentos(){return page('Monitoramento','Acompanhamentos','Escolha e gerencie o que a Bussola deve monitorar.','<button class="btn" id="newwatch">Novo acompanhamento</button>')+`<div class="grid2"><div class="stack">${S.watches.map((w,i)=>`<article class="row"><span class="ico">${w.type[0]}</span><div><h3>${w.title}</h3><p>${w.type} - ${w.scope} - ${w.cadence}</p>${tags(w.groups.concat([w.channel,w.updates+' updates']))}</div><button class="btn2" data-toast="Deltas abertos">Ver deltas</button></article>`).join('')}</div><aside class="panel"><h2>Criar acompanhamento</h2><label>Tema<input id="watchtitle" placeholder="Privacidade em IoT"></label><label>Escopo<select id="watchscope"><option>IRTF + IETF</option><option>Somente IRTF</option><option>Ponte IETF</option></select></label><label>Canal<select id="watchchannel"><option>Painel</option><option>E-mail</option><option>Digest</option><option>Teams</option></select></label><button class="btn full" id="createwatch">Criar acompanhamento</button></aside></div>`}
function oportunidades(){return page('Acoes recomendadas','Oportunidades','Itens priorizados com base nos seus interesses e atividades recentes.')+tabs(['Todas','Threads ativas','Drafts recentes','Reunioes proximas','Maturacao'])+`<div class="grid2"><div class="stack">${opp.map(o=>row(o,'Abrir pacote')).join('')}</div>${card('Acoes para voce',['Comentarios pendentes em rascunhos - 3','Threads nao lidas - 8','Oportunidades salvas - '+S.saved.length,'Convites para colaborar - 2'].map(x=>`<p><b>${x}</b></p>`).join(''))}</div>`}
function grupos(){return page('Catalogo canonico','Grupos','Explore grupos, atividades, documentos e conexoes.')+`<div class="toolbar"><input placeholder="Pesquisar grupo"><button class="on">Todos</button><button>Somente IRTF</button><button>Ponte IETF</button></div><div class="groups">${groups.map(g=>`<article class="group"><div class="badge" style="background:${g.c}">${g.ac}</div><h3>${g.ac}</h3><p><b>${g.name}</b></p><p>${g.txt}</p>${tags(g.t)}<div class="mini"><div><dt>Drafts</dt><dd>${g.drafts}</dd></div><div><dt>Atividade</dt><dd>${g.act}</dd></div><div><dt>Pessoas</dt><dd>${g.p}</dd></div></div><button class="btn2" data-watch="${g.ac}">Acompanhar</button></article>`).join('')}</div>`}
function adjacencia(){return page('Inteligencia relacional','Mapa de adjacencia','Compare relacoes por semantica, autores, citacoes e mencoes.')+`<div class="toolbar"><button>Periodo 2025</button><button>Tipo: Todos</button><button class="on">Somente sinais fortes</button><button data-toast="GraphML preparado">Exportar</button></div><div class="grid2">${card('Rede atual',graph())}${card('Adjacencias detectadas',[['T2TRG','CoRE','0,86'],['CFRG','TLS','0,82'],['GAIA','DINRG','0,78'],['NMRG','T2TRG','0,71']].map(a=>`<p><b>${a[0]} <-> ${a[1]}</b><br>${tags(['Semantico','Citacao cruzada',a[2]])}</p>`).join(''),'Ver evidencias')}</div>`}
function pacotes(){let items=['Charter do T2TRG','RFC 9174 - Things Directory','draft-irtf-t2trg-telemetry-privacy-02','Threads relevantes','Materiais de reuniao IRTF 120'];return page('Entrada guiada','Pacotes de leitura','Curadoria para entender temas e preparar participacao.')+`<div class="grid2">${card('Introducao ao T2TRG e adjacencias com CoRE',items.map((x,i)=>`<article class="row"><span class="ico">${i+1}</span><div><h3>${x}</h3><p>${[15,30,35,20,45][i]} min - ${i<1?'Concluido':i===1?'Em andamento':'Nao iniciado'}</p></div><button class="btn2" data-toast="Progresso atualizado">Marcar</button></article>`).join(''),'Gerar rascunho')}${card('Ordem sugerida',items.map((x,i)=>`<p><b>${i+1}. ${x}</b></p>`).join(''))}</div>`}
function rascunhos(){let b='Dear T2TRG,\n\nI am reviewing privacy and telemetry considerations for constrained devices and would appreciate feedback from the group.\n\nKey questions:\n- Are the proposed privacy boundaries clear?\n- Should metadata minimization be documented as a requirement?\n- Are there related CoRE documents we should cite?\n\nThanks in advance.';return page('Contribuicoes','Rascunhos','Prepare mensagens para listas com clareza, evidencias e tom adequado.')+`<div class="grid2"><div class="panel"><label>Grupo alvo<select><option>T2TRG</option><option>GAIA</option><option>CoRE</option></select></label><label>Assunto<input value="Feedback request: privacy telemetry in constrained devices"></label><label>Mensagem<textarea class="editor" id="draftbody">${b}</textarea></label><button class="btn" id="gendraft">Gerar nova sugestao</button> <button class="btn2" data-toast="Texto copiado">Copiar texto</button></div>${card('Checklist antes de enviar',['Linguagem direta','Sem tom comercial','Citar draft/RFC','Pergunta objetiva','Tom respeitoso'].map(x=>`<p><span class="tag green">ok</span> ${x}</p>`).join(''))}</div>`}
function evidencias(){return page('Auditoria','Evidencias','Cada recomendacao e fundamentada em fontes rastreaveis.')+`<div class="grid2"><article class="table"><header><h2>48 evidencias encontradas</h2><button class="btn2">Filtrar</button></header><table class="data"><thead><tr><th>Fonte</th><th>Trecho</th><th>Conf.</th><th>Acao</th></tr></thead><tbody>${ev.map(e=>`<tr><td><b>${e[0]}</b><br>${e[1]}</td><td>${e[5]}</td><td><span class="ok">${e[3].toFixed(2)}</span></td><td><button class="btn2" data-toast="Detalhe aberto">Detalhes</button></td></tr>`).join('')}</tbody></table></article>${card('Evidencia selecionada',`<h3>${ev[0][0]}</h3><p class="notice">${ev[0][5]}</p>${tags(['T2TRG','CoRE','GAIA-DINRG'])}<br><br><button class="btn" data-toast="Feedback registrado">Util</button> <button class="bad" data-toast="Feedback registrado">Incorreta</button>`,'Abrir fonte original')}</div>`}
function pessoas(){let ps=[['Laura Castro','CFRG, TLS, QUIC',5,18,'Muito alta'],['Rafael Pacheco','T2TRG, CoRE, ROLL',4,12,'Alta'],['Mariana Farias','GAIA, HIP, ICANN',4,11,'Alta'],['Andre Silva','DINRG, NMRG, ICNRG',4,9,'Media']];return page('Conexoes humanas','Pessoas ponte','Descubra colaboradores que conectam grupos, temas e documentos.')+`<div class="grid2"><article class="table"><table class="data"><thead><tr><th>Pessoa</th><th>Grupos</th><th>Conectados</th><th>Rascunhos</th><th>Forca</th></tr></thead><tbody>${ps.map(p=>`<tr><td><b>${p[0]}</b></td><td>${p[1]}</td><td>${p[2]}</td><td>${p[3]}</td><td>${p[4]}</td></tr>`).join('')}</tbody></table></article>${card('Insights gerais',metrics())}</div>`}
function relatorios(){return page('Pesquisa e exportacao','Relatorios','Gere relatorios, snapshots e artefatos de pesquisa.')+metrics()+`<div class="grid2">${card('Relatorio de Evolucao Tematica: Privacidade em IoT','<p>A privacidade em IoT continua em ascensao, impulsionada por regulacoes emergentes e dispositivos conectados.</p><div class="mini"><div><dt>Publicacoes</dt><dd>1.245</dd></div><div><dt>Autores</dt><dd>892</dd></div><div><dt>Impacto</dt><dd>0,78</dd></div></div><button class="btn" data-toast="PDF preparado">Exportar PDF</button>')}${card('Modelos favoritos',['Panorama regulatorio','Analise tematica','Relatorio comparativo','Relatorio executivo'].map(x=>`<p><b>${x}</b></p>`).join(''))}</div>`}
function fontes(){let rows=[['Datatracker','Ativa','812.347','Excelente'],['RFC Editor','Ativa','196.852','Excelente'],['Mailarchive','Ativa','1.128.943','Excelente'],['Meeting Materials','Ativa','128.765','Excelente'],['Embeddings Index','Ativa','112.384','Bom']];return page('Pipeline','Fontes de dados','Monitore e gerencie fontes publicas conectadas a plataforma.')+`<article class="table"><table class="data"><thead><tr><th>Fonte</th><th>Status</th><th>Registros</th><th>Saude</th><th></th></tr></thead><tbody>${rows.map(r=>`<tr><td><b>${r[0]}</b></td><td><span class="ok">${r[1]}</span></td><td>${r[2]}</td><td>${r[3]}</td><td><button class="btn2" data-toast="${r[0]} sincronizado">Sincronizar</button></td></tr>`).join('')}</tbody></table></article>`}
function ingestao(){return page('Operacao','Saude da ingestao','Monitore coleta, validacao, enriquecimento, embeddings e indexacao.')+metrics()+`<div class="grid3">${['Coleta','Validacao','Enriquecimento','Deduplicacao','Embeddings','Indexacao'].map((x,i)=>`<article class="card"><h2>${x}</h2><p><span class="${i===4?'warn':'ok'}">${i===4?'Atencao':'Ativo'}</span></p><p>Taxa ${842-i*80}/s - Erros ${i===4?12:i}</p></article>`).join('')}</div>`}
function chair(){return page('Coordenacao','Modo Chair','Painel para visao estrategica do grupo e proximas acoes.')+`<div class="grid3">${[['Novos temas emergentes','7','+2'],['Sobreposicoes detectadas','4','sem alteracao'],['Novos participantes','5','+3'],['Threads aquecidas','6','+2']].map(m=>`<article class="metric"><small>${m[0]}</small><strong>${m[1]}</strong><span>${m[2]}</span></article>`).join('')}</div><div class="grid2">${card('Temas emergentes',['Privacidade e telemetria em IoT restrito','Minimizacao de dados em dispositivos constrained','Coleta segura em redes de baixa conectividade'].map(x=>`<p><b>${x}</b> ${tags(['Alta','IoT'])}</p>`).join(''))}${card('Proximas acoes sugeridas',opp.slice(0,4).map(o=>row(o,'Executar')).join(''))}</div>`}
function notif(){return page('Central','Notificacoes','Acompanhe todas as notificacoes e alertas em um so lugar.')+tabs(['Todas 128','Nao lidas 24','FYI 32','Janela de acao 28','Maturacao 18'])+`<div class="stack">${opp.concat(opp.slice(0,3)).map(o=>row(o,'Arquivar')).join('')}</div>`}
function perfil(){return page('Conta','Perfil do usuario','Gerencie informacoes pessoais, preferencias e participacao.')+`<div class="grid2">${card('Mariana Oliveira','<div class="mini"><div><dt>Contribuicoes</dt><dd>12</dd></div><div><dt>Comentarios</dt><dd>28</dd></div><div><dt>Eventos</dt><dd>4</dd></div></div><p>Pesquisadora em redes e seguranca da Internet. Interessada em tecnologias abertas, governanca e impacto social.</p><button class="btn">Editar perfil</button>')}${card('Preferencias',['Portugues (Brasil)','Nivel intermediario','Resumo diario','E-mail e painel'].map(x=>`<p><b>${x}</b></p>`).join(''))}</div>`}
function config(){return page('Preferencias','Configuracoes','Personalize idioma, fontes, privacidade e notificacoes.')+`<div class="grid2"><div class="panel"><h2>Idioma da plataforma</h2>${['Portugues (Brasil)','Espanol','English'].map((x,i)=>`<button class="${i?'btn2':'btn'}" style="margin:4px">${x}</button>`).join('')}<h2>Nivel de experiencia</h2>${['Iniciante','Intermediario','Avancado'].map((x,i)=>`<p><label><input type="radio" name="level" ${i===1?'checked':''}> ${x}</label></p>`).join('')}<button class="btn" data-toast="Configuracoes salvas">Salvar alteracoes</button></div>${card('Resumo e notificacoes',['E-mail','Painel','Microsoft Teams','Digest semanal'].map(x=>`<p><span class="tag green">ativo</span> ${x}</p>`).join(''))}</div>`}
function tabs(a){return `<div class="tabs">${a.map((x,i)=>`<button class="${i?'':'on'}">${x}</button>`).join('')}</div>`}function simple(t){return page('MVP',t,'Tela funcional de demonstracao com dados, filtros e acoes.')+metrics()+`<div class="grid2"><div class="stack">${opp.map(o=>row(o)).join('')}</div>${card('Evidencias',ev.map(e=>`<p><b>${e[0]}</b><br>${e[5]}</p>`).join(''))}</div>`}
function render(){if(!S.user&&S.route!=='login')S.route='login';let pages={inicio,descoberta,onboarding,torre,acompanhamentos,oportunidades,grupos,adjacencia,pacotes,rascunhos,evidencias,pessoas,relatorios,fontes,ingestao,chair,notificacoes:notif,perfil,configuracoes:config};document.getElementById('root').innerHTML=S.route==='login'?login():shell((pages[S.route]||(()=>simple('Bussola IETF')))());bind()}
function bind(){document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{S.authMode=b.dataset.mode;render()});let f=document.getElementById('auth');if(f)f.onsubmit=async e=>{e.preventDefault();let email=document.getElementById('email').value,pass=document.getElementById('pass').value,path=S.authMode==='login'?'/auth/v1/token?grant_type=password':'/auth/v1/signup',r=await supabase(path,{method:'POST',body:JSON.stringify({email,password:pass})});if(r.ok&&(r.data.access_token||r.data.user)){S.session=r.data;S.user={email,name:email.split('@')[0],role:'Participante'};save();go('inicio');toast('Sessao iniciada pelo Supabase.')}else{S.session={demo:true};S.user={email:'demo@bussola.ietf',name:'Ana Martins',role:'Participante'};save();go('inicio');toast('Entrando em modo demo para apresentar o MVP.')}};let d=document.getElementById('demo');if(d)d.onclick=()=>{S.session={demo:true};S.user={email:'demo@bussola.ietf',name:'Ana Martins',role:'Participante'};save();go('inicio')};document.querySelectorAll('[data-nav]').forEach(b=>b.onclick=()=>go(b.dataset.nav));document.querySelectorAll('[data-locale]').forEach(b=>b.onclick=()=>{S.locale=b.dataset.locale;render()});document.querySelectorAll('[data-toast]').forEach(b=>b.onclick=e=>{e.preventDefault();toast(b.dataset.toast)});document.querySelectorAll('[data-watch]').forEach(b=>b.onclick=()=>{S.watches.unshift({title:'Acompanhar '+b.dataset.watch,type:'Grupo',scope:'IRTF + IETF',groups:[b.dataset.watch],cadence:'Semanal',channel:'Painel',updates:0,status:'Ativo'});save();toast('Acompanhamento criado.')});let cw=document.getElementById('createwatch');if(cw)cw.onclick=()=>{S.watches.unshift({title:document.getElementById('watchtitle').value||'Novo acompanhamento',type:'Tema',scope:document.getElementById('watchscope').value,groups:['T2TRG','CoRE'],cadence:'Semanal',channel:document.getElementById('watchchannel').value,updates:0,status:'Ativo'});save();render();toast('Acompanhamento criado.')};let rb=document.getElementById('routebtn');if(rb)rb.onclick=()=>{S.query=document.getElementById('routeq').value;save();go('descoberta')};let an=document.getElementById('analyze');if(an)an.onclick=()=>{S.query=document.getElementById('dq').value;save();toast('Tema analisado com evidencias locais e Datatracker.');render()};let gd=document.getElementById('gendraft');if(gd)gd.onclick=()=>{document.getElementById('draftbody').value+='\n\nSuggested reference: T2TRG charter and CoRE security draft.';toast('Nova sugestao gerada.')};let lo=document.getElementById('logout');if(lo)lo.onclick=()=>{delete localStorage.bussola_user;delete localStorage.bussola_session;S.user=null;S.session=null;go('login')};let g=document.getElementById('global');if(g)g.onchange=()=>{S.query=g.value;save();toast('Busca atualizada.')}}
addEventListener('hashchange',()=>{S.route=location.hash.replace('#/','')||(S.user?'inicio':'login');render()});render();
</script></body></html>
