<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bussola IETF</title>
  <style>
    body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:#f7faff;color:#07132f}.loading{min-height:100vh;display:grid;place-items:center;padding:24px}.card{max-width:560px;background:white;border:1px solid #dce4f2;border-radius:8px;padding:28px;box-shadow:0 18px 46px rgba(22,36,70,.08)}.brand{font-size:28px;font-weight:850;color:#061a38}.bar{height:8px;border-radius:99px;background:#edf2f8;overflow:hidden;margin-top:20px}.bar span{display:block;width:62%;height:100%;background:linear-gradient(135deg,#0b62df,#4f46e5)}
  </style>
</head>
<body>
  <div class="loading"><div class="card"><div class="brand">Bussola IETF</div><p>Carregando a experiencia completa do MVP...</p><div class="bar"><span></span></div></div></div>
  <script>
    (async function(){
      try {
        const url = 'https://raw.githubusercontent.com/marceloanderson88/IETF_AI_system/main/index.html?ts=' + Date.now();
        const html = await fetch(url, { cache: 'no-store' }).then(r => r.text());
        document.open(); document.write(html); document.close();
      } catch (err) {
        document.body.innerHTML = '<main style="font-family:Segoe UI,Arial,sans-serif;padding:40px"><h1>Bussola IETF</h1><p>Nao foi possivel carregar a aplicacao completa agora. Recarregue a pagina em alguns segundos.</p></main>';
      }
    })();
  </script>
</body>
</html>
