<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bussola IETF</title>
  <style>
    :root{--navy:#071f44;--navy2:#04152d;--blue:#0f63d8;--violet:#4b3df2;--ink:#0c1736;--muted:#64708d;--line:#dce4f2;--soft:#f6f9ff;--green:#16a34a;--orange:#ea7a12;--red:#dc2626;--r:8px}*{box-sizing:border-box}body{margin:0;font:15px/1.5 Segoe UI,Arial,sans-serif;color:var(--ink);background:linear-gradient(180deg,#fff,#f7faff)}button,input,textarea,select{font:inherit}button{cursor:pointer}.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}.side{position:sticky;top:0;height:100vh;padding:28px 18px;color:white;background:radial-gradient(circle at 10% 0,rgba(43,124,255,.25),transparent 28%),linear-gradient(180deg,var(--navy),var(--navy2));display:flex;flex-direction:column;gap:22px}.brand{display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.16);padding-bottom:18px}.mark{width:46px;height:46px;border:2px solid #e5f0ff;border-radius:50%;display:grid;place-items:center}.mark:after{content:"";width:18px;height:18px;background:linear-gradient(135deg,#fff,#7fb0ff 55%,#f2b94b 56%);clip-path:polygon(50% 0,80% 50%,50% 100%,20% 50%);transform:rotate(45deg)}.brand b{font-size:24px}.brand small{display:block;color:#b8c8de}.nav{display:grid;gap:6px}.nav button{height:46px;text-align:left;border:0;border-radius:var(--r);padding:0 14px;color:#eef5ff;background:transparent}.nav button.active,.nav button:hover{background:linear-gradient(135deg,var(--blue),var(--violet))}.profile{margin-top:auto;border:1px solid rgba(255,255,255,.17);border-radius:var(--r);padding:16px;background:rgba(255,255,255,.06)}.bar{height:76px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.92);display:flex;align-items:center;gap:16px;padding:0 32px;position:sticky;top:0;z-index:3}.search{max-width:620px;flex:1;height:48px;border:1px solid var(--line);border-radius:var(--r);padding:0 16px}.langs{margin-left:auto;display:flex;border:1px solid var(--line);border-radius:var(--r);overflow:hidden}.langs button{width:48px;height:40px;border:0;background:white}.langs .on{background:var(--blue);color:white}.user{display:flex;gap:10px;align-items:center}.avatar{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;background:#e8efff;font-weight:800}.content{padding:34px 40px 50px}.title{display:flex;justify-content:space-between;gap:20px;margin-bottom:24px}.title small{color:var(--blue);font-weight:800;text-transform:uppercase}.title h1{font-size:40px;line-height:1.05;margin:0 0 6px}.title p{margin:0;color:var(--muted)}.hero{border-radius:var(--r);padding:42px 48px;color:white;background:linear-gradient(90deg,#09275b,#195ac2);display:grid;grid-template-columns:1.3fr .7fr;gap:28px;box-shadow:0 18px 46px rgba(22,36,70,.08)}.hero h2{font-size:38px;margin:0 0 10px}.hero p{color:#d8e6ff}.route{display:flex;gap:10px;background:white;border-radius:var(--r);padding:8px;margin-top:22px}.route input{flex:1;border:0;padding:0 12px}.primary{border:0;border-radius:7px;background:linear-gradient(135deg,var(--blue),var(--violet));color:white;font-weight:800;padding:12px 20px}.compass{aspect-ratio:1;border-radius:50%;border:1px solid rgba(255,255,255,.3);background:radial-gradient(circle,rgba(255,255,255,.2),transparent 60%)}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:20px 0}.card,.metric,.row,.panel{border:1px solid var(--line);border-radius:var(--r);background:white;box-shadow:0 18px 46px rgba(22,36,70,.08)}.metric{padding:20px}.metric small{color:var(--muted)}.metric b{display:block;font-size:30px}.metric span{color:var(--green);font-weight:800}.layout{display:grid;grid-template-columns:1fr 360px;gap:18px;align-items:start}.stack{display:grid;gap:14px}.card{padding:20px}.card h2{margin:0 0 12px}.tabs{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}.tabs button{border:1px solid var(--line);background:white;border-radius:var(--r);padding:10px 16px}.tabs .on{background:#eff5ff;color:var(--blue);border-color:#9dbbff}.row{padding:18px;display:grid;grid-template-columns:54px 1fr auto;gap:16px;align-items:center;border-left:4px solid var(--blue)}.row.red{border-left-color:var(--red)}.row.green{border-left-color:var(--green)}.row.orange{border-left-color:var(--orange)}.icon{width:48px;height:48px;border-radius:var(--r);display:grid;place-items:center;background:#eef4ff;color:var(--blue);font-weight:900}.tag{display:inline-block;padding:4px 9px;border-radius:6px;background:#edf3ff;color:#23418a;font-size:12px;font-weight:800;margin:4px 5px 0 0}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.group{padding:20px}.badge{width:62px;height:62px;border-radius:50%;display:grid;place-items:center;color:white;font-weight:900;margin-bottom:12px}.graph{width:100%;height:420px}.graph line{stroke:#145bd7}.graph .s{stroke:#8b45d1;stroke-width:2}.graph .d{stroke:#f97316;stroke-dasharray:3 3}.graph circle{fill:white;stroke-width:2}.graph text{text-anchor:middle;font-size:5px;font-weight:800}.form{display:grid;gap:12px}.form input,.form select,.form textarea{width:100%;border:1px solid var(--line);border-radius:var(--r);padding:12px;background:white}.form textarea{min-height:140px}.table{display:grid}.trow{display:grid;grid-template-columns:1.2fr 1.8fr .5fr .8fr;gap:12px;padding:14px 0;border-bottom:1px solid #edf2f8}.quote{background:#fff8df;border:1px solid #f3d48b;border-radius:var(--r);padding:14px}.hidden{display:none}@media(max-width:1050px){.app{grid-template-columns:92px 1fr}.brand b,.brand small,.profile{display:none}.nav button{font-size:0;text-align:center}.layout,.hero{grid-template-columns:1fr}.grid4,.cards{grid-template-columns:repeat(2,1fr)}}@media(max-width:720px){.app{display:block}.side{height:auto;position:relative}.nav{grid-template-columns:repeat(2,1fr)}.nav button{font-size:14px}.bar{height:auto;flex-wrap:wrap;padding:14px}.search{order:3;min-width:100%}.content{padding:22px 16px}.grid4,.cards{grid-template-columns:1fr}.row,.trow{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="app"><aside class="side"><div class="brand"><span class="mark"></span><span><b>Bussola IETF</b><small>Navegue. Conecte. Contribua.</small></span></div><nav class="nav" id="nav"></nav><div class="profile"><b>Perfil: Iniciante</b><small> Nivel 1 - 120 pts</small><div style="height:8px;background:rgba(255,255,255,.22);border-radius:99px;margin-top:10px"><span style="display:block;width:42%;height:100%;background:white;border-radius:99px"></span></div></div></aside><main><header class="bar"><input class="search" value="privacidade em IoT e telemetria em dispositivos restritos"><div class="langs"><button class="on">PT</button><button>ES</button><button>EN</button></div><div class="user"><span class="avatar">AM</span><span>Ana Martins<br><small>Participante</small></span></div></header><section class="content" id="page"></section></main></div>
<script>
const groups=[['T2TRG','Thing-to-Thing Research Group','#0ea5a4','IoT, Telemetria, Privacidade'],['GAIA','Global Access to the Internet for All','#149a49','Inclusao, Acesso, Sustentabilidade'],['CFRG','Crypto Forum Research Group','#143b78','Seguranca, Criptografia'],['DINRG','Decentralized Internet Research Group','#8c249b','Descentralizacao, Governanca'],['NMRG','Network Management Research Group','#2763d3','Operacao, Medicao'],['CoRE','Constrained RESTful Environments','#138a76','IETF, Constrained, CoAP']];
const opp=[['Comentar rascunho do T2TRG antes do interim','Alta','T2TRG','18','red'],['Ler nova thread no GAIA','Media','GAIA','7',''],['Preparar contribuicao para o CoRE','Media','CoRE','12','green'],['Revisar topico emergente IRTF -> IETF','Media','CFRG','9','orange']];
const ev=[['T2TRG - Charter','privacidade, seguranca e confianca na coleta, processamento e troca de dados de telemetria','0,86'],['CoRE - Draft','seguranca e privacidade em ambientes restritos, incluindo OAuth 2.0 para dispositivos','0,83'],['GAIA - Material de reuniao','discussao sobre privacidade em IoT de baixo custo e coleta minima de dados pessoais','0,78']];
const routes=['inicio','descoberta','acompanhamentos','oportunidades','grupos','adjacencia','pacotes','rascunhos','evidencias','relatorios','configuracoes']; const labels=['Inicio','Descoberta','Acompanhamentos','Oportunidades','Grupos','Mapa de Adjacencia','Pacotes de Leitura','Rascunhos','Evidencias','Relatorios','Configuracoes'];
function nav(){document.getElementById('nav').innerHTML=routes.map((r,i)=>`<button class="${route()==r?'active':''}" onclick="location.hash='/${r}'">${labels[i]}</button>`).join('')}
function route(){return location.hash.replace('#/','')||'inicio'} function title(k,t,p){return `<div class="title"><div><small>${k}</small><h1>${t}</h1><p>${p}</p></div></div>`}
function metrics(){return `<div class="grid4">${[['Acompanhamentos ativos','24','+20%'],['Evidencias indexadas','8.736','+715 hoje'],['Adjacencias fortes','18','+5'],['Precisao util','76%','+8 p.p.']].map(m=>`<div class="metric"><small>${m[0]}</small><b>${m[1]}</b><span>${m[2]}</span></div>`).join('')}</div>`}
function home(){return title('Visao geral','Encontre seu caminho no IETF','Descubra temas, grupos, documentos e oportunidades para participar com contexto.')+`<section class="hero"><div><h2>Roteie um tema de pesquisa para grupos, evidencias e proximas acoes.</h2><p>A Bussola organiza Datatracker, RFCs, listas, materiais de reuniao e sinais de adjacencia em recomendacoes auditaveis.</p><div class="route"><input value="privacidade em IoT"><button class="primary" onclick="location.hash='/descoberta'">Rotear tema</button></div></div><div class="compass"></div></section>${metrics()}<div class="layout"><div class="card"><h2>Destaques da semana</h2>${opp.map(row).join('')}</div><div class="card"><h2>Mapa de adjacencia</h2>${graph()}</div></div>`}
function row(o){return `<article class="row ${o[4]}"><span class="icon">${o[2][0]}</span><div><b>${o[0]}</b><p>${o[1]} - ${o[2]} - evidencias ${o[3]}</p></div><button class="primary">Abrir</button></article>`}
function discovery(){return title('Descoberta','Descoberta explicavel','Roteie perguntas para grupos IRTF/IETF com justificativas e fontes rastreaveis.')+`<div class="layout"><div class="stack">${groups.slice(0,3).map((g,i)=>`<article class="row"><span class="icon">${i+1}</span><div><h2>${g[0]}</h2><p>${g[1]}</p><span class="tag">${g[3]}</span></div><b>${[92,86,78][i]}%</b></article>`).join('')}</div><div class="card"><h2>Evidencias</h2>${ev.map(e=>`<p><b>${e[0]}</b><br>${e[1]} <span class="tag">${e[2]}</span></p>`).join('')}</div></div>`}
function groupsPage(){return title('Catalogo','Grupos','Explore grupos de pesquisa, atividade recente, conexoes e documentos chave.')+`<div class="cards">${groups.map(g=>`<article class="card group"><div class="badge" style="background:${g[2]}">${g[0]}</div><h2>${g[0]}</h2><p>${g[1]}</p><span class="tag">${g[3]}</span><p><button>Ver grupo</button> <button>Acompanhar</button></p></article>`).join('')}</div>`}
function graph(){let n=[['T2TRG',20,45,'#0ea5a4'],['GAIA',45,18,'#149a49'],['DINRG',75,26,'#8c249b'],['CFRG',44,53,'#143b78'],['CoRE',28,74,'#138a76'],['TLS',62,74,'#0f766e'],['NMRG',76,56,'#2763d3']],p=Object.fromEntries(n.map(x=>[x[0],[x[1],x[2]]])),l=[['T2TRG','GAIA','s'],['T2TRG','CoRE',''],['GAIA','DINRG',''],['CFRG','TLS','s'],['GAIA','TLS','d'],['DINRG','NMRG','']];return `<svg class="graph" viewBox="0 0 100 90">${l.map(x=>`<line class="${x[2]}" x1="${p[x[0]][0]}" y1="${p[x[0]][1]}" x2="${p[x[1]][0]}" y2="${p[x[1]][1]}"></line>`).join('')}${n.map(x=>`<g><circle cx="${x[1]}" cy="${x[2]}" r="7" style="stroke:${x[3]}"></circle><text x="${x[1]}" y="${x[2]+1}">${x[0]}</text></g>`).join('')}</svg>`}
function simple(name){return title(name,name,'Tela demonstrativa com componentes do design system, dados de exemplo e fluxos principais.')+metrics()+`<div class="layout"><div class="card"><h2>Itens principais</h2>${opp.map(row).join('')}</div><div class="card"><h2>Fontes e evidencias</h2>${ev.map(e=>`<p><b>${e[0]}</b><br>${e[1]}</p>`).join('')}</div></div>`}
function evidencias(){return title('Auditoria','Evidencias','Cada recomendacao e fundamentada em fontes rastreaveis e verificaveis.')+`<div class="layout"><div class="card"><div class="table">${ev.map(e=>`<div class="trow"><b>${e[0]}</b><span>${e[1]}</span><b>${e[2]}</b><button>Detalhes</button></div>`).join('')}</div></div><div class="card"><h2>Evidencia selecionada</h2><p class="quote">${ev[0][1]}</p><button class="primary">Abrir fonte original</button></div></div>`}
function render(){nav();let r=route();let pages={inicio:home,descoberta:discovery,grupos:groupsPage,adjacencia:()=>title('Inteligencia temporal','Mapa de Adjacencia','Sinais semanticos, autores, citacoes e mencoes.')+`<div class="layout"><div class="card">${graph()}</div><div class="card"><h2>Adjacencias detectadas</h2>${['T2TRG <-> CoRE 0,86','CFRG <-> TLS 0,82','GAIA <-> DINRG 0,78'].map(x=>`<p><b>${x}</b><br><span class="tag">Semantico</span><span class="tag">Citacao cruzada</span></p>`).join('')}</div></div>`,evidencias:evidencias};document.getElementById('page').innerHTML=(pages[r]||(()=>simple(labels[routes.indexOf(r)]||'Bussola IETF')))()}
addEventListener('hashchange',render);render();
</script>
</body>
</html>
